<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Luau Hub</title>
    <link rel="stylesheet" href="style.css">
    <!-- Thư viện Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div id="system-wrapper">
        <!-- Khung xác thực bảo mật ban đầu -->
        <div id="auth-box" class="panel">
            <header class="panel-header">
                <span class="status-dot"></span>
                <h2>SECURITY GATEWAY // VERIFICATION</h2>
            </header>
            <div class="panel-body">
                <p>Xác thực bảo mật hệ thống để tiếp tục:</p>
                
                <div class="input-group" style="margin-bottom: 8px;">
                    <input type="password" id="password" placeholder="Nhập mật khẩu hệ thống..." autocomplete="off">
                </div>
                
                <div style="font-size: 13px; color: #ff9f43; margin-bottom: 15px;">
                    💡 Mật khẩu truy cập hệ thống: <b style="color: var(--primary-color);">123456</b>
                </div>

                <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-theme="dark"></div>

                <button id="auth-btn" style="width: 100%; margin-top: 15px;">TRUY CẬP HỆ THỐNG</button>
                <div id="error-msg" class="error-text"></div>
            </div>
        </div>

        <!-- Nội dung chính sau khi vượt qua màn hình bảo mật -->
        <main id="content" class="hidden">
            <nav class="top-nav">
                <h1>LUAU SCRIPT ARCHIVE</h1>
                <div class="system-stats">Trạng thái: <span class="online">HOẠT ĐỘNG</span></div>
            </nav>
            
            <section class="container" id="card-container">
                <!-- Nội dung các mục sẽ được tự động nạp chuẩn xác tại đây -->
            </section>
        </main>
    </div>

    <!-- Tải cấu hình dữ liệu và file bảo mật -->
    <script src="config.js"></script>
    <script src="auth.js"></script>

    <!-- Script điều khiển hiển thị giao diện và logic tạo key random -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("card-container");
            if (!container || typeof SYSTEM_CONFIG === "undefined") return;

            container.innerHTML = "";

            SYSTEM_CONFIG.sections.forEach((section, index) => {
                const card = document.createElement("div");
                card.className = "card";

                let actionHtml = "";

                if (section.btnAction === "key_wall") {
                    // Mục 3: Nhập Key 7 ngày
                    actionHtml = `
                        <div style="margin-top: 15px; border-top: 1px dashed #1f293d; padding-top: 15px;">
                            <p style="font-size: 13px; color: #ff9f43; margin-bottom: 8px;">🔒 Nhập Key 7 ngày để mở khóa:</p>
                            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                                <input type="text" id="key-input-${index}" placeholder="Dán key luaurb_..." style="flex: 1; padding: 10px; background: #060911; border: 1px solid #1f293d; color: #fff; border-radius: 6px; font-family: monospace;">
                                <button onclick="verifyKey(${index}, '${section.redirectUrl || "https://google.com"}')" style="padding: 10px 15px; background: #00ffcc; color: #0b0f19; border: none; font-weight: bold; border-radius: 6px; cursor: pointer;">XÁC THỰC</button>
                            </div>
                            <a href="${section.buttonLink}" target="_blank" style="display: inline-block; color: #00ffcc; font-size: 13px; text-decoration: underline;">👉 Bấm vào đây để lấy Key Lootlabs (2 phút)</a>
                        </div>
                    `;
                } else {
                    // Mục 1 và 2: Bấm vào tự động tạo key random luau-.......... (10 chữ số) rồi chuyển trang
                    actionHtml = `
                        <button onclick="handleRandomKeyRedirect('${section.redirectUrl || "https://google.com"}')" style="margin-top: 15px; width: 100%; padding: 10px; background: #00ffcc; color: #0b0f19; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s;">
                            CLICK HERE (Nhận Key & Chuyển trang)
                        </button>
                    `;
                }

                card.innerHTML = `
                    <h3>${section.title}</h3>
                    <p style="color: #94a3b8; font-size: 14px; margin-bottom: 10px;">${section.description}</p>
                    <pre style="background: #060911; padding: 12px; border-radius: 6px; overflow-x: auto; color: #00ffcc; font-family: monospace; font-size: 13px;"><code>${section.codeSnippet}</code></pre>
                    ${actionHtml}
                `;

                container.appendChild(card);
            });
        });

        // Hàm tạo key random 10 chữ số dạng luau-.......... cho Mục 1 & 2 rồi chuyển trang
        function handleRandomKeyRedirect(redirectUrl) {
            const chars = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let randomCode = "";
            for (let i = 0; i < 10; i++) {
                randomCode += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            const generatedKey = "luau-" + randomCode;

            // Copy key vào clipboard tự động cho người dùng
            navigator.clipboard.writeText(generatedKey).then(() => {
                alert("🎉 Tạo thành công Key: " + generatedKey + "\n📋 Đã tự động copy vào bộ nhớ tạm! Đang chuyển trang...");
                window.location.href = redirectUrl;
            }).catch(err => {
                alert("🎉 Tạo thành công Key: " + generatedKey + "\nĐang chuyển trang...");
                window.location.href = redirectUrl;
            });
        }

        // Hàm xử lý xác thực Key cho Mục 3
        function verifyKey(index, redirectUrl) {
            const inputField = document.getElementById(`key-input-${index}`);
            const userEnteredKey = inputField.value.trim();

            let savedData = localStorage.getItem("luau_key_data");
            
            if (!savedData) {
                alert("Bạn chưa có Key! Vui lòng bấm vào link lấy key ở bên dưới.");
                return;
            }

            let keyObj = JSON.parse(savedData);
            const now = new Date().getTime();

            if (now > keyObj.expiresAt) {
                alert("Key của bạn đã hết hạn 7 ngày. Vui lòng lấy key mới!");
                return;
            }

            if (userEnteredKey === keyObj.key) {
                alert("Xác thực thành công! Đang chuyển hướng sang trang tạm thời...");
                window.location.href = redirectUrl;
            } else {
                alert("Key không chính xác! Hãy kiểm tra lại.");
            }
        }
    </script>
</body>
</html>
