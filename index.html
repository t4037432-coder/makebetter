<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Meme Verification System</title>
    <!-- Liên kết file CSS giao diện -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="system-wrapper">
        <!-- Khung xác thực bảo mật -->
        <div id="auth-box" class="panel">
            <header class="panel-header">
                <span class="status-dot"></span>
                <h2>SECURE GATEWAY // LEVEL 1</h2>
            </header>
            <div class="panel-body">
                <p>Nhập mã khóa truy cập hệ thống dữ liệu:</p>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Nhập mật khẩu..." autocomplete="off">
                    <button id="auth-btn">KÍCH HOẠT</button>
                </div>
                <div id="error-msg" class="error-text"></div>
            </div>
        </div>

        <!-- Khu vực hiển thị nội dung chính sau khi vượt qua bảo mật -->
        <main id="content" class="hidden">
            <nav class="top-nav">
                <h1>HỆ THỐNG PHÂN TÍCH MEME NÂNG CAO</h1>
                <div class="system-stats">Trạng thái: <span class="online">ĐÃ KẾT NỐI</span></div>
            </nav>
            
            <section class="container" id="card-container">
                <!-- Nội dung các thẻ ảnh sẽ được nạp tự động thông qua JavaScript -->
            </section>
        </main>
    </div>

    <!-- Tải các file kịch bản JavaScript theo thứ tự -->
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
